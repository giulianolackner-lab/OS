<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LDM-OS - Émulateur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
        
        .monitor {
            background: #1a1a1a;
            border: 20px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,255,0,0.3);
        }
        
        .screen {
            width: 720px;
            height: 400px;
            background: #000;
            padding: 10px;
            overflow-y: auto;
            cursor: text;
        }
        
        .terminal {
            color: #00ff00;
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        .input-line {
            display: flex;
            color: #00ff00;
        }
        
        .prompt { color: #00ff00; margin-right: 5px; }
        
        #cmd-input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            flex: 1;
        }
        
        .output { color: #fff; }
        .error { color: #ff4444; }
        .info { color: #44aaff; }
        .success { color: #44ff44; }
        
        .taskbar {
            background: #1a1a1a;
            border-top: 2px solid #00ff00;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            color: #00ff00;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="monitor">
        <div class="screen" id="screen">
            <div class="terminal" id="terminal">
                <div class="output">LDM-OS BIOS v1.0 - Copyright (c) 2024</div>
                <div class="output">CPU: x86 32-bit Protected Mode</div>
                <div class="output">RAM: 4 MB detected</div>
                <div class="output">-------------------------------------------</div>
                <div class="info">Bootloader: Chargement du secteur 1...</div>
                <div class="success">Bootloader: OK - Passage en mode protégé</div>
                <div id="kernel-output"></div>
            </div>
        </div>
        <div class="taskbar">
            <span>LDM-OS Kernel v1.0</span>
            <span id="clock">00:00:00</span>
        </div>
    </div>

    <script src="os-simulator.js"></script>
</body>
</html>
